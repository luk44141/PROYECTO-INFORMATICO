<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wordle Escolar</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="app">

  <!-- INICIO -->
  <section id="inicio" class="pantalla">
    <div class="card">
      <div class="logo-badge"><span>✏️ Juego educativo</span></div>

      <h1 class="titulo">Wordle <span class="titulo-acento">Escolar</span></h1>

      <div class="divider"></div>

      <p class="desc">Adiviná la palabra oculta en 6 intentos. Cada letra revelará pistas.</p>

      <button class="btn btn-primary" onclick="irMenu()">Empezar a jugar</button>
    </div>
  </section>

  <!-- MENÚ -->
  <section id="menu" class="pantalla oculto">
    <div class="card">
      <h2 class="subtitulo">¿Cómo jugás?</h2>
      <p class="desc">Elegí tu modo de juego</p>

      <div class="divider"></div>

      <div class="menu-botones">
        <button class="btn btn-secondary" onclick="irSelector('individual')">
          <span class="menu-icono">👤</span> Individual
        </button>
        <button class="btn btn-secondary" onclick="irSelector('multi')">
          <span class="menu-icono">👥</span> Multijugador
        </button>
      </div>
    </div>
  </section>

  <!-- SELECTOR -->
  <section id="selector" class="pantalla oculto">
    <div class="card">
      <button class="btn btn-small btn-secondary" onclick="irMenu()">← Volver</button>

      <div id="selectorIcono"></div>
      <h2 class="subtitulo" id="selectorTitulo">Modo</h2>

      <div class="divider"></div>

      <select id="cantLetras" class="dropdown">
        <option value="">¿Cuántas letras?</option>
        <option value="4">4 letras</option>
        <option value="5">5 letras</option>
        <option value="6">6 letras</option>
        <option value="7">7 letras</option>
        <option value="8">8 letras</option>
      </select>

      <p id="selectorHint"></p>

      <button class="btn btn-primary" onclick="iniciarDesdeSelector()">¡Jugar!</button>
    </div>
  </section>

  <!-- JUEGO INDIVIDUAL -->
  <section id="juego" class="pantalla oculto">
    <div class="card grande">
      <div class="header">
        <button class="btn btn-small btn-secondary" onclick="irMenu()">←</button>
        <h2>Individual</h2>
        <button class="btn btn-small btn-secondary" onclick="reiniciar()" title="Nueva palabra">↺</button>
      </div>

      <div class="divider"></div>

      <div id="tablero" class="tablero"></div>

      <p id="mensaje" class="mensaje"></p>

      <div id="botonesJuego" class="oculto">
        <button class="btn btn-primary" onclick="reiniciar()">Otra vez</button>
        <button class="btn btn-secondary" onclick="irMenu()">Menú</button>
      </div>
    </div>
  </section>

  <!-- JUEGO MULTI -->
  <section id="multi" class="pantalla oculto">
    <div class="card grande">

      <div class="header">
        <button class="btn btn-small btn-secondary" onclick="irMenu()">←</button>
        <h2>Multijugador</h2>
        <button class="btn btn-small btn-secondary" onclick="reiniciarMulti()" title="Reiniciar">↺</button>
      </div>

      <div class="scores-bar">
        <div class="score-panel" id="panelJ1">
          <span class="score-label">Jugador 1</span>
          <span class="score-num" id="p1">0</span>
        </div>
        <span class="score-vs">VS</span>
        <div class="score-panel" id="panelJ2">
          <span class="score-label">Jugador 2</span>
          <span class="score-num" id="p2">0</span>
        </div>
      </div>

      <p id="turnoTexto" class="turno-texto"></p>
      <p id="mensajeMulti" class="mensaje"></p>

      <div class="multi">
        <div id="tablero1" class="tablero"></div>
        <div id="tablero2" class="tablero"></div>
      </div>

      <div id="botonesMulti" class="oculto">
        <button class="btn btn-primary" onclick="reiniciarMulti()">Siguiente ronda</button>
        <button class="btn btn-secondary" onclick="irMenu()">Menú</button>
      </div>

    </div>
  </section>

</div>

<script src="script.js"></script>
</body>
</html>
